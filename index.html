<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rock Paper Scissors - Cyber HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        h1, .tech-font { font-family: 'Orbitron', sans-serif; }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        #loading-screen, #game-screen { display: none; opacity: 0; }
        
        h1 { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 229, 255, 0.8); color: #00e5ff; margin-bottom: 20px; text-align: center; letter-spacing: 2px;}
        
        .primary-btn {
            font-family: 'Orbitron', sans-serif;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: #00e5ff;
            border: 2px solid #00e5ff;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4), inset 0 0 15px rgba(0, 229, 255, 0.2);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .primary-btn:hover { background: rgba(0, 229, 255, 0.1); box-shadow: 0 0 25px rgba(0, 229, 255, 0.8), inset 0 0 20px rgba(0, 229, 255, 0.5); transform: scale(1.02); }
        .primary-btn:disabled { border-color: #334155; color: #334155; box-shadow: none; cursor: not-allowed; transform: none; background: transparent; }

        .loader {
            border: 4px solid #0b0f19;
            border-top: 4px solid #00e5ff;
            border-right: 4px solid #00e5ff;
            border-radius: 50%;
            width: 70px; height: 70px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-stats {
            width: 100%;
            background: rgba(11, 15, 25, 0.9);
            border-bottom: 2px solid #00e5ff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.1);
            z-index: 10;
        }
        .stash-counter { color: #f472b6; font-weight: 700; text-shadow: 0 0 10px rgba(244, 114, 182, 0.5); }
        
        #game-screen { justify-content: flex-start; padding-top: 0; }
        
        .status-bar {
            width: 100%; max-width: 1000px;
            margin-top: 20px;
            text-align: center;
        }

        #result-text { font-size: 2.2rem; font-weight: 900; height: 50px; text-transform: uppercase; letter-spacing: 3px; color: #fff;}

        .middle-section {
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            gap: 50px; margin: 30px 0; width: 100%; max-width: 1000px; flex-grow: 1;
        }

        .camera-wrapper {
            display: flex; flex-direction: column; align-items: center;
            position: relative; 
            padding: 10px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
            border-radius: 10px;
        }
        
        #camera-flash {
            position: absolute;
            top: 50px; 
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 60px);
            background: white;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        
        .flash-anim { animation: cameraFlash 0.5s ease-out; }
        @keyframes cameraFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

        .live-badge {
            font-family: 'Orbitron', sans-serif;
            width: 100%; text-align: left;
            padding: 5px 10px; margin-bottom: 10px;
            font-size: 1rem; font-weight: 700; color: #00e5ff;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            text-transform: uppercase;
        }
        
        #webcam-container canvas {
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #334155;
            width: 350px; height: 350px;
            object-fit: cover;
            transition: filter 0.1s ease;
        }

        .cyber-shader {
            filter: contrast(1.5) brightness(1.2) hue-rotate(180deg) saturate(2) drop-shadow(0 0 15px rgba(0, 229, 255, 0.6)) !important;
            border-color: #00e5ff !important;
        }

        .graph-container {
            background: rgba(11, 15, 25, 0.8); padding: 25px; border-radius: 10px; width: 350px;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        .graph-container h3 { margin-bottom: 20px; color: #94a3b8; text-transform: uppercase; text-align: left; font-size: 1rem; border-bottom: 1px solid #334155; padding-bottom: 10px;}
        .bar-row { margin-bottom: 15px; display: flex; flex-direction: column; }
        .bar-header { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; color: #cbd5e1; font-family: 'Orbitron', sans-serif;}
        .bar-bg { width: 100%; height: 12px; background: #1e293b; overflow: hidden; border-radius: 2px;}
        .bar-fill { height: 100%; width: 0%; background: #00e5ff; transition: width 0.1s ease, background-color 0.2s ease; box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);}

        .bottom-bar {
            width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 25px; margin-bottom: 40px;
        }
        .moves-display {
            display: flex; gap: 80px; width: 100%; justify-content: center;
            font-size: 1.2rem; color: #64748b; text-transform: uppercase; font-family: 'Orbitron', sans-serif;
        }
        .move-slot { display: flex; flex-direction: column; align-items: center; width: 150px; }
        .move-value { font-size: 2.2rem; color: #ffffff; margin-top: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.3);}
        
        .text-win { color: #4ade80 !important; text-shadow: 0 0 20px rgba(74, 222, 128, 0.6); }
        .text-lose { color: #f87171 !important; text-shadow: 0 0 20px rgba(248, 113, 113, 0.6); }
        .text-tie { color: #facc15 !important; text-shadow: 0 0 20px rgba(250, 204, 21, 0.6); }
        .text-loading { color: #facc15 !important; text-shadow: 0 0 20px rgba(250, 204, 21, 0.6); }
        
    </style>
</head>
<body>

    <div id="landing-screen" class="screen" style="opacity: 1;">
        <h1>SYSTEM TERMINAL</h1>
        <p style="font-size: 1.2rem; color: #94a3b8; margin-bottom: 40px; font-family: 'Orbitron', sans-serif;">AWAITING OPERATOR INPUT</p>
        <button class="primary-btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="loading-screen" class="screen">
        <div class="loader"></div>
        <h2 class="tech-font" style="color: #00e5ff;">ESTABLISHING UPLINK...</h2>
        <p style="color: #64748b; margin-top: 10px;">Please allow camera access.</p>
    </div>

    <div id="game-screen" class="screen">
        
        <div class="top-stats tech-font">
            <div>OPERATOR: <span style="color: #00e5ff;">ACTIVE</span></div>
            <div class="stash-counter">🍬 STASH: <span id="jr-count">50</span> JOLLY RANCHERS</div>
        </div>

        <div class="status-bar">
            <div id="result-text" class="tech-font">SYSTEM READY</div>
        </div>

        <div class="middle-section">
            
            <div class="camera-wrapper">
                <div class="live-badge" id="live-prediction">SYS.VISION // SCANNING</div>
                <div id="camera-flash"></div> 
                <div id="webcam-container"></div>
            </div>

            <div class="graph-container" id="probability-graph"></div>

        </div>

        <div class="bottom-bar">
            <div class="moves-display">
                <div class="move-slot">
                    <span>OPERATOR</span>
                    <span class="move-value" id="user-move">-</span>
                </div>
                <div class="move-slot">
                    <span>CPU</span>
                    <span class="move-value" id="comp-move">-</span>
                </div>
            </div>
            <button class="primary-btn" id="shoot-btn" onclick="handleGameButton()">TAKE SNAPSHOT</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // --- YOUR MODEL URL HERE ---
        const URL = "https://teachablemachine.withgoogle.com/models/34uVIcG4n/";

        let model, webcam, maxPredictions;
        
        // Updated Game Variables
        let jollyRanchers = 50; 
        const winReward = 10;
        const losePenalty = 5;
        let isFrozen = false; 

        function switchScreen(hideId, showId) {
            document.getElementById(hideId).style.opacity = "0";
            setTimeout(() => {
                document.getElementById(hideId).style.display = "none";
                document.getElementById(showId).style.display = "flex";
                setTimeout(() => document.getElementById(showId).style.opacity = "1", 50);
            }, 400);
        }

        async function startGame() {
            switchScreen('landing-screen', 'loading-screen');

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmImage.Webcam(350, 350, flip); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                let graphHTML = "<h3 class='tech-font'>NEURAL NET CONFIDENCE</h3>";
                for (let i = 0; i < maxPredictions; i++) {
                    graphHTML += `
                        <div class="bar-row">
                            <div class="bar-header">
                                <span id="label-${i}">CLASS ${i}</span>
                                <span id="pct-${i}">0%</span>
                            </div>
                            <div class="bar-bg"><div class="bar-fill" id="bar-${i}"></div></div>
                        </div>
                    `;
                }
                document.getElementById("probability-graph").innerHTML = graphHTML;

                switchScreen('loading-screen', 'game-screen');
            } catch (error) {
                console.error("Error:", error);
                alert("Failed to load AI. Check your camera permissions.");
            }
        }

        async function loop() {
            if (!isFrozen) {
                webcam.update(); 
                await predict(); 
            }
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let highestProb = 0;
            let currentMove = "";

            for (let i = 0; i < maxPredictions; i++) {
                const p = prediction[i];
                const pct = Math.round(p.probability * 100);
                
                document.getElementById(`label-${i}`).innerText = p.className.toUpperCase();
                document.getElementById(`pct-${i}`).innerText = pct + "%";
                
                const barElement = document.getElementById(`bar-${i}`);
                barElement.style.width = pct + "%";
                
                if (pct > 65) {
                    barElement.style.backgroundColor = "#00e5ff";
                    barElement.style.boxShadow = "0 0 10px rgba(0, 229, 255, 0.8)";
                } else {
                    barElement.style.backgroundColor = "#334155";
                    barElement.style.boxShadow = "none";
                }

                if (p.probability > highestProb) {
                    highestProb = p.probability;
                    currentMove = p.className;
                }
            }

            const liveBadge = document.getElementById("live-prediction");
            if (highestProb > 0.65) {
                liveBadge.innerText = `SYS.VISION // DETECTED: ${currentMove.toUpperCase()}`;
                liveBadge.style.color = "#00e5ff"; 
            } else {
                liveBadge.innerText = "SYS.VISION // SEARCHING...";
                liveBadge.style.color = "#64748b"; 
            }
        }

        function handleGameButton() {
            const btn = document.getElementById("shoot-btn");
            if (btn.innerText === "RESET SENSOR") {
                resetForNextRound();
            } else {
                playTurn();
            }
        }

        function resetForNextRound() {
            isFrozen = false;
            
            document.querySelector("#webcam-container canvas").classList.remove("cyber-shader");
            const flashElement = document.getElementById("camera-flash");
            flashElement.classList.remove("flash-anim");
            void flashElement.offsetWidth; 
            
            document.getElementById("shoot-btn").innerText = "TAKE SNAPSHOT";
            const resultText = document.getElementById("result-text");
            resultText.innerText = "SYSTEM READY";
            resultText.className = "tech-font";
            document.getElementById("user-move").innerText = "-";
            document.getElementById("comp-move").innerText = "-";
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function playTurn() {
            const btn = document.getElementById("shoot-btn");
            const resultText = document.getElementById("result-text");
            
            // Check for Bankrupt state
            if (jollyRanchers <= 0) {
                resultText.innerText = "OUT OF JOLLY RANCHERS!";
                resultText.className = "tech-font text-lose";
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            
            // INSTANT SNAPSHOT
            document.getElementById("camera-flash").classList.add("flash-anim");
            await delay(50); 
            
            // Freeze feed
            isFrozen = true; 
            document.querySelector("#webcam-container canvas").classList.add("cyber-shader");

            // --- SUSPENSE LOADING PHASE ---
            resultText.className = "tech-font text-loading"; 
            resultText.innerText = "ANALYZING TARGET.";
            await delay(500);
            resultText.innerText = "ANALYZING TARGET..";
            await delay(500);
            resultText.innerText = "ANALYZING TARGET...";
            await delay(500);

            // AI calculates based on the frozen frame
            const prediction = await model.predict(webcam.canvas);
            let highestProbability = 0;
            let userMove = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProbability) {
                    highestProbability = prediction[i].probability;
                    userMove = prediction[i].className; 
                }
            }
            
            if(highestProbability < 0.60) {
                userMove = "Not Sure";
            }

            const choices = ["Rock", "Paper", "Scissors"];
            const computerMove = choices[Math.floor(Math.random() * choices.length)];
            
            document.getElementById("user-move").innerText = userMove.toUpperCase();
            document.getElementById("comp-move").innerText = computerMove.toUpperCase();
            
            determineWinner(userMove, computerMove);
            
            btn.disabled = false;
            btn.innerText = "RESET SENSOR";
        }

        function determineWinner(user, comp) {
            const u = user.toLowerCase();
            const c = comp.toLowerCase();
            const resultText = document.getElementById("result-text");
            const jrCounter = document.getElementById("jr-count");
            
            if (u === "not sure") {
                resultText.innerText = "ERROR: UNKNOWN SHAPE";
                resultText.className = "tech-font text-tie";
                return;
            }

            if (u === c) {
                resultText.innerText = "DRAW DETECTED";
                resultText.className = "tech-font text-tie";
                return;
            }
            
            if (
                (u === "rock" && c === "scissors") ||
                (u === "paper" && c === "rock") ||
                (u === "scissors" && c === "paper")
            ) {
                // Extended Win Text
                resultText.innerText = `OPERATOR WINS (+${winReward} JOLLY RANCHERS)`;
                resultText.className = "tech-font text-win";
                jollyRanchers += winReward;
            } else if (u === "rock" || u === "paper" || u === "scissors") {
                // Re-added Penalty and Text
                resultText.innerText = `SYSTEM WINS (-${losePenalty} JOLLY RANCHERS)`;
                resultText.className = "tech-font text-lose";
                jollyRanchers -= losePenalty;
            }

            // Prevent going below 0
            if (jollyRanchers < 0) jollyRanchers = 0;
            
            // Update the display
            jrCounter.innerText = jollyRanchers;
        }
    </script>
</body>
</html>
